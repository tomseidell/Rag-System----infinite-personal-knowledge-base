name: Migrate

on:
  workflow_dispatch: # trigger manually 

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECS_CLUSTER: main-cluster
  ECS_API_TASK_FAMILY: api-task

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
        # login to aws cli with env variables
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get network config
        # 1. take private subnet id from aws cli
        # 2. take security group id (api) from aws cli
        run: |
          SUBNET_ID=$(aws ec2 describe-subnets \
            --filters "Name=tag:Name,Values=*private*" \
            --query "Subnets[0].SubnetId" \
            --output text)
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=cb-api-security-group" \
            --query "SecurityGroups[0].GroupId" \
            --output text)
          echo "SUBNET_ID=$SUBNET_ID" >> "$GITHUB_ENV"
          echo "SG_ID=$SG_ID" >> "$GITHUB_ENV"

      - name: Run alembic upgrade head
        # 1. start ecs task and override start command to "alembic upgrade head"
        # 2. wait until task has finished
        # 3. check if exit code == 0 (success)
        # 4. stop workflow if migration failed
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$ECS_API_TASK_FAMILY" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_ID],securityGroups=[$SG_ID],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["alembic","upgrade","head"]}]}' \
            --query "tasks[0].taskArn" \
            --output text)
          echo "Waiting for migration task to complete..."
          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --query "tasks[0].containers[0].exitCode" \
            --output text)
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migration completed successfully"
