name: CD

on:
  workflow_dispatch: # manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest # linux vm

    env: # set env variables
      AWS_REGION: ${{ secrets.AWS_REGION }} # take from github env
      ECR_API_REPO: api
      ECR_WORKER_REPO: worker

      ECS_CLUSTER: main-cluster
      ECS_API_SERVICE: api-service
      ECS_WORKER_SERVICE: worker-service
      ECS_PDF_READER_SERVICE: pdf-reader-service

      ECS_API_TASK_FAMILY: api-task
      ECS_WORKER_TASK_FAMILY: worker-task
      ECS_PDF_READER_TASK_FAMILY: pdf-reader-task

    steps:
      - uses: actions/checkout@v4 # clone local code to vm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6 # use aws action to login to aws cli
        with: # take aws credentials from github env
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2 # use aws action to login to aws ecr with aws config from above
        id: ecr # save output in "ecr" var

      - name: Build & push API image
        env:
          IMAGE: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_API_REPO }}:${{ github.sha }} # github.sha => unique hash id for commit
        run: | # build image from dockerfile in api folder and push to ecr
          docker build -t "$IMAGE" -f api/Dockerfile . 
          docker push "$IMAGE"
          echo "API_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Build & push Worker image
        env:
          IMAGE: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_WORKER_REPO }}:${{ github.sha }}
        run: | # build image from dockerfile in worker folder and push to ecr
          docker build -t "$IMAGE" -f worker/Dockerfile .
          docker push "$IMAGE"
          echo "WORKER_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Register new API task definition revision
        # 1. load current task definition
        # 2. add new image and delete internal fields which aws re-creates for new image automatically
        # 3. create new revision and send to aws via cli
        run: |
          TD=$(aws ecs describe-task-definition --task-definition "$ECS_API_TASK_FAMILY" --query taskDefinition)
          NEW=$(echo "$TD" | jq --arg IMAGE "$API_IMAGE" '
            .containerDefinitions |= (map(if .name=="api" then .image=$IMAGE else . end))
            | del( 
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )')
          ARN=$(aws ecs register-task-definition --cli-input-json "$NEW" --query taskDefinition.taskDefinitionArn --output text)
          echo "API_TD_ARN=$ARN" >> "$GITHUB_ENV"

      - name: Deploy API service
        # restart container with new task definition
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_API_SERVICE" \
            --task-definition "$API_TD_ARN" \
            --force-new-deployment

      - name: Register new Worker task definition revision
        # 1. load current task definition
        # 2. add new image and delete internal fields which aws re-creates for new image automatically
        # 3. create new revision and send to aws via cli
        run: |
          TD=$(aws ecs describe-task-definition --task-definition "$ECS_WORKER_TASK_FAMILY" --query taskDefinition)
          NEW=$(echo "$TD" | jq --arg IMAGE "$WORKER_IMAGE" '
            .containerDefinitions |= (map(if .name=="worker" then .image=$IMAGE else . end))
            | del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )')
          ARN=$(aws ecs register-task-definition --cli-input-json "$NEW" --query taskDefinition.taskDefinitionArn --output text)
          echo "WORKER_TD_ARN=$ARN" >> "$GITHUB_ENV"

      - name: Deploy Worker service
        # restart container with new task definition
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_WORKER_SERVICE" \
            --task-definition "$WORKER_TD_ARN" \
            --force-new-deployment

      - name: Register new pdf-reader task definition revision
        # pdf-reader uses the same worker image — only update the image reference
        run: |
          TD=$(aws ecs describe-task-definition --task-definition "$ECS_PDF_READER_TASK_FAMILY" --query taskDefinition)
          NEW=$(echo "$TD" | jq --arg IMAGE "$WORKER_IMAGE" '
            .containerDefinitions |= (map(if .name=="pdf-reader" then .image=$IMAGE else . end))
            | del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )')
          ARN=$(aws ecs register-task-definition --cli-input-json "$NEW" --query taskDefinition.taskDefinitionArn --output text)
          echo "PDF_READER_TD_ARN=$ARN" >> "$GITHUB_ENV"

      - name: Deploy pdf-reader service
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_PDF_READER_SERVICE" \
            --task-definition "$PDF_READER_TD_ARN" \
            --force-new-deployment
