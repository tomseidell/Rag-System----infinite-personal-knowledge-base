name: CI 

# run pipeline for push in backend branch and for opened pull requests on main branch 
on:
  push:
    branches:
      - "dev/backend"
      - "dev/backend/**"
  pull_request:
    branches:
      - main
    paths: # only run when code in api folder changed
      - "api/**"

jobs:
  lint: # check on syntax, imports and formatting
    runs-on: ubuntu-latest # start ubunutu vm 
    steps:
      - uses: actions/checkout@v4 # move code to vm
      - uses: actions/setup-python@v5 # install python
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check api/ shared/

  test:
    runs-on: ubuntu-latest
    needs: lint        # only runs when lint passes
    env: ## add env vars
      ENVIRONMENT: ${{ secrets.ENVIRONMENT }}
      DATABASE_USER: ${{ secrets.DATABASE_USER }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_HOST: ${{ secrets.DB_HOST }}
      GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
      GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: | # install requirements
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - run: pytest -v --cov=api


  security: # check for secure dependencies
    runs-on: ubuntu-latest
    needs: lint 
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: |
          pip-audit -r requirements.txt \
            --ignore-vuln CVE-2026-27794 \
            --ignore-vuln CVE-2026-25990
