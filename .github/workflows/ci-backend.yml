name: CI 

# run pipeline for push in backend branch and for opened pull requests on main branch 
on:
  push:
    branches:
      - "dev/backend"
      - "dev/backend/**"
  pull_request:
    branches:
      - main
    paths: # only run when code in api folder changed
      - "api/**"

jobs:
  lint: # check on syntax, imports and formatting
    runs-on: ubuntu-latest # start ubunutu vm 
    steps:
      - uses: actions/checkout@v4 # move code to vm
      - uses: actions/setup-python@v5 # install python
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff api/ shared/

  test:
    runs-on: ubuntu-latest
    needs: lint        # only runs when lint passes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: | # install requirements
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - run: pytest -v --cov=api --cov-fail-under=80 # min 80% coverage

  security: # check for secure dependencies
    runs-on: ubuntu-latest
    needs: lint 
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt
