name: CI 

# run pipeline for push in backend branch and for opened pull requests on main branch 
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint: # check on syntax, imports and formatting
    runs-on: ubuntu-latest # start ubunutu vm 
    steps:
      - uses: actions/checkout@v4 # move code to vm
      - uses: actions/setup-python@v6 # install python
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check api/ shared/ infra/ worker/

  test:
    runs-on: ubuntu-latest
    env: ## add env vars
      ENVIRONMENT: ${{ secrets.ENVIRONMENT }}
      DATABASE_USER: ${{ secrets.DATABASE_USER }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_HOST: ${{ secrets.DB_HOST }}
      S3_BUCKET_NAME: test-bucket
      S3_ENDPOINT_URL: ""
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: | # install requirements
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - run: pytest -v --cov=api

  security: # check for secure dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: |
          pip-audit -r requirements.txt \
            --ignore-vuln CVE-2026-27794 \
            --ignore-vuln CVE-2026-25990
